<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Qala News - Админ-панель</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="topbar">
        <a class="logo" href="index.html" aria-label="Qala News на главную"
          >Qala<span>News</span></a
        >
        <button class="nav-toggle" type="button">☰</button>
        <nav class="main-nav">
          <a href="index.html">Все</a>
          <a href="index.html?category=Политика">Политика</a>
          <a href="index.html?category=Экономика">Экономика</a>
          <a href="index.html?category=Спорт">Спорт</a>
        </nav>
        <div id="userMenu" class="user-menu"></div>
      </div>
    </header>

    <main class="page-shell">
      <section class="news-feed">
        <div class="section-heading">
          <h2>Админ-панель</h2>
          <button id="logoutBtn" class="primary-button">Выйти</button>
        </div>

        <div class="admin-stats">
          <div class="stat-card">
            <h3>Всего новостей</h3>
            <span id="totalNews">0</span>
          </div>
          <div class="stat-card">
            <h3>Всего пользователей</h3>
            <span id="totalUsers">0</span>
          </div>
          <div class="stat-card">
            <h3>Категории</h3>
            <span id="categoriesCount">0</span>
          </div>
        </div>

        <div class="admin-actions">
          <button id="createNewsBtn" class="primary-button">
            Создать новость
          </button>
          <button id="manageCategoriesBtn" class="secondary-button">
            Управление категориями
          </button>
        </div>

        <div id="newsGrid" class="news-grid"></div>
        <div id="pagination" class="pagination"></div>
      </section>
    </main>

    <!-- Модальное окно для новостей -->
    <div class="modal" id="newsModal" style="display: none">
      <div class="modal-content">
        <span class="modal-close">&times;</span>
        <h2 id="modalTitle">Создать новость</h2>
        <form id="newsForm" enctype="multipart/form-data">
          <label>
            Заголовок
            <input type="text" id="newsTitle" required />
          </label>
          <label>
            Категория
            <select id="newsCategory" required>
              <option value="">Выберите категорию</option>
            </select>
          </label>
          <label>
            Содержание
            <textarea id="newsContent" rows="10" required></textarea>
          </label>
          <label>
            Краткое описание
            <textarea id="newsExcerpt" rows="3"></textarea>
          </label>
          <label>
            Изображения (JPG, PNG, GIF, WEBP)
            <input type="file" id="newsImages" accept="image/*" multiple />
          </label>
          <label>
            Теги (через запятую)
            <input type="text" id="newsTags" placeholder="тег1, тег2, тег3" />
          </label>
          <label
            style="
              display: flex;
              align-items: center;
              gap: 10px;
              margin: 15px 0;
            "
          >
            <input type="checkbox" id="newsFeatured" value="1" />
            Сделать главной новостью
          </label>
          <div id="imagePreview" class="image-preview"></div>
          <button type="submit" class="primary-button">Сохранить</button>
          <button type="button" id="cancelBtn" class="secondary-button">
            Отмена
          </button>
        </form>
      </div>
    </div>

    <!-- Модальное окно для категорий -->
    <div class="modal" id="categoryModal" style="display: none">
      <div class="modal-content">
        <h2>Управление категориями</h2>

        <div id="categoriesList" class="categories-list"></div>

        <h3>Создать новую категорию</h3>
        <form id="categoryForm">
          <label>
            Название
            <input type="text" id="categoryName" required /> </label
          ><br />
          <label>
            Slug (уникальный идентификатор)
            <input
              type="text"
              id="categorySlug"
              required
              placeholder="naprimer-tak"
            />
          </label>
          <br />
          <label>
            Описание
            <textarea id="categoryDescription" rows="2"></textarea></label
          ><br />
          <label>
            Иконка (emoji)
            <input type="text" id="categoryIcon" placeholder="🏛️" /> </label
          ><br />
          <button type="submit" class="primary-button">
            Создать категорию
          </button>
        </form>
      </div>
    </div>

    <footer class="site-footer">
      <p>&copy; 2026 Qala News. Все права защищены.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
