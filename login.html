<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход - Qala News</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="loginTitle">
      <a class="logo" href="index.html">Qala<span>News</span></a>
      <p class="section-kicker">Авторизация</p>
      <h1 id="loginTitle">Войти в аккаунт</h1>
      <form id="loginForm" class="auth-form">
        <label>
          Email
          <input id="email" type="email" required>
        </label>
        <label>
          Пароль
          <input id="password" type="password" required>
        </label>
        <p id="authMessage" class="form-message" role="status"></p>
        <button class="primary-button" style="height: 40px; border-radius: 8px;" type="submit">Войти</button>
      </form>
      <p class="auth-hint">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
    </section>
  </main>

  <script src="api.js"></script>
  <script src="auth.js"></script>
</body>
</html>
