<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Регистрация - Qala News</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="registerTitle">
      <a class="logo" href="index.html">Qala<span>News</span></a>
      <p class="section-kicker">Новый аккаунт</p>
      <h1 id="registerTitle">Регистрация</h1>
      <form id="registerForm" class="auth-form">
        <label>
          Имя
          <input id="name" type="text" required placeholder="Ваше имя">
        </label>
        <label>
          Email
          <input id="email" type="email" required placeholder="you@example.com">
        </label>
        <label>
          Пароль
          <input id="password" type="password" minlength="6" required placeholder="Минимум 6 символов">
        </label>
        <p id="authMessage" class="form-message" role="status"></p>
        <button class="primary-button" type="submit">Создать аккаунт</button>
      </form>
      <p class="auth-hint">Уже есть аккаунт? <a href="login.html">Войти</a></p>
    </section>
  </main>

  <script src="api.js"></script>
  <script src="auth.js"></script>
</body>
</html>
