<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Админ-панель - Qala News</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <a class="logo admin-logo" href="index.html">Qala<span>News</span></a>
        <nav aria-label="Навигация администратора">
          <button
            class="admin-nav-link is-active"
            type="button"
            data-view="list"
          >
            Список новостей
          </button>
          <button class="admin-nav-link" type="button" data-view="form">
            Создать новость
          </button>
        </nav>
        <div id="adminUser" class="admin-user"></div>
        <a class="back-link" href="index.html">Вернуться на сайт</a>
      </aside>

      <main class="admin-main">
        <header class="admin-header">
          <div>
            <p class="section-kicker">Панель управления</p>
            <h1>Новости</h1>
          </div>
          <button id="createButton" class="primary-button" type="button">
            Создать новость
          </button>
        </header>

        <section
          id="listView"
          class="admin-section"
          aria-labelledby="tableTitle"
        >
          <div class="section-heading">
            <h2 id="tableTitle">Все статьи</h2>
            <span id="adminCount"></span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Заголовок</th>
                  <th>Дата</th>
                  <th>Статус</th>
                  <th>Действия</th>
                </tr>
              </thead>
              <tbody id="newsTable"></tbody>
            </table>
          </div>
        </section>

        <section
          id="formView"
          class="admin-section is-hidden"
          aria-labelledby="formTitle"
        >
          <h2 id="formTitle">Создать новость</h2>
          <form id="newsForm" class="news-form">
            <input type="hidden" id="newsId" />
            <div class="form-grid">
              <label>
                Заголовок
                <input
                  id="title"
                  type="text"
                  required
                  placeholder="Введите заголовок"
                />
              </label>
              <label>
                URL картинки
                <input
                  id="imageUrl"
                  type="url"
                  required
                  placeholder="https://..."
                />
              </label>
              <label>
                Категория
                <select id="category" required>
                  <option value="Политика">Политика</option>
                  <option value="Экономика">Экономика</option>
                  <option value="Спорт">Спорт</option>
                </select>
              </label>
              <label>
                Статус
                <select id="status" required>
                  <option value="Опубликовано">Опубликовано</option>
                  <option value="Черновик">Черновик</option>
                </select>
              </label>
            </div>
            <label>
              Краткое описание
              <textarea
                id="excerpt"
                rows="3"
                required
                placeholder="Короткий лид для карточки"
              ></textarea>
            </label>
            <label>
              Текст новости
              <textarea
                id="content"
                rows="12"
                required
                placeholder="Полный текст статьи"
              ></textarea>
            </label>
            <label>
              Теги
              <input
                id="tags"
                type="text"
                placeholder="Астана, бюджет, спорт"
              />
            </label>
            <div class="form-actions">
              <button class="primary-button" type="submit">Сохранить</button>
              <button id="cancelButton" class="secondary-button" type="button">
                Отмена
              </button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script src="api.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
